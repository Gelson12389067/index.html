<!DOCTYPE html>
<html>
<head>
                <style></style>
            </head>
            <body>
                


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Pro - Sistema Anti-Spam</title>
    <style>
        /* MANTENDO TODO O SEU CSS ORIGINAL */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #075E54; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #login-screen { position: fixed; inset: 0; background: #075E54; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 360px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 8px; outline: none; }
        .login-box button { width: 100%; padding: 12px; border: none; background: #25D366; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }

        #main-app { width: 100%; height: 100vh; display: none; background: #e5ddd5; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #075E54; color: white; position: relative; }
        .btn-logout { position: absolute; right: 15px; top: 20px; background: none; border: 1px solid white; color: white; font-size: 10px; padding: 4px; cursor: pointer; border-radius: 4px; }
        
        .search-area { padding: 10px 15px; background: #f6f6f6; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; gap: 8px; }
        .search-row { display: flex; gap: 8px; }
        .search-row input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        .btn-add { background: #25D366; border: none; color: white; width: 40px; border-radius: 8px; cursor: pointer; font-size: 20px; }

        .server-list { flex: 1; overflow-y: auto; }
        .server-btn { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid #f2f2f2; }
        .server-btn:hover { background: #f0f0f0; }
        .server-info { display: flex; align-items: center; }
        .server-icon { width: 40px; height: 40px; background: #075E54; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
        
        .btn-request { background: #ffbc00; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn-waiting { background: #ccc; cursor: default; }

        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-header { padding: 15px 25px; background: #ededed; border-bottom: 1px solid #ddd; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-color: #e5ddd5; }
        
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 8px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); align-self: flex-start; word-wrap: break-word; position: relative; }
        .mine { align-self: flex-end; background: #dcf8c6; }
        .bubble img { max-width: 100%; border-radius: 4px; margin-top: 5px; display: block; }

        .btn-del-msg { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 14px; float: right; margin-left: 10px; opacity: 0.6; }
        .btn-del-msg:hover { opacity: 1; }

        #members-modal { position: absolute; top: 60px; right: 20px; background: white; border: 1px solid #ddd; border-radius: 8px; width: 250px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .member-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

        .notification-bar { background: #fff3cd; padding: 10px; font-size: 13px; border-bottom: 1px solid #ffeeba; display: none; flex-direction: column; gap: 5px; }
        .notif-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 5px 10px; border-radius: 5px; }
        .btn-notif { padding: 3px 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }

        .input-area { padding: 10px 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        .input-area input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        .btn-send, .btn-file { background: #075E54; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-file { background: #25D366; font-size: 20px; }
        
        /* ESTILO NOVO: Ícone Lápis e Coroa */
        .btn-edit-nick { cursor: pointer; font-size: 14px; margin-left: 5px; color: #dcf8c6; }
        .crown { color: #ffbc00; font-style: normal; }
    </style>



<div id="login-screen">
    <div class="login-box">
        <h2 id="login-title">Acesse o Chat</h2>
        <input type="text" id="userIn" placeholder="Usuário">
        <input type="password" id="passIn" placeholder="Senha">
        <button id="btnAuth">Entrar</button>
        <p id="btnToggle" style="cursor:pointer; margin-top:15px; font-size:12px; text-decoration:underline;">Criar nova conta</p>
    </div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="sidebar-header">
            <b>Chat Pro <span class="btn-edit-nick" onclick="mudarNick()">✎</span></b>
            <button class="btn-logout" id="btnLogout">SAIR</button>
            <div id="loggedAs" style="font-size: 11px; margin-top: 5px;"></div>
        </div>
        
        <div class="search-area">
            <div class="search-row">
                <input type="text" id="newSrvName" placeholder="Novo grupo...">
                <button id="btnCreateServer" class="btn-add">+</button>
            </div>
            <div class="search-row">
                <input type="text" id="globalSearch" placeholder="Buscar por Pessoas ou Servidores">
                <button id="btnSearch" class="btn-add" style="background: #34b7f1; font-size: 14px;">🔍</button>
            </div>
        </div>
        <div id="serverList" class="server-list"></div>
    </div>

    <div id="chat-main">
        <div id="chat-header">
            <span id="chatTitle">Selecione um grupo</span>
            <button id="btnShowMembers" style="background:none; border:none; cursor:pointer; font-size:20px; display:none;">👥</button>
        </div>
        <div id="members-modal"></div>
        <div id="adminNotifications" class="notification-bar"></div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="btn-file" id="btnTriggerFile">+</button>
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="btnSend" class="btn-send">&gt;</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, off, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "chat-1f282.firebaseapp.com",
        databaseURL: "https://chat-1f282-default-rtdb.firebaseio.com",
        projectId: "chat-1f282",
        storageBucket: "chat-1f282.appspot.com",
        appId: "1:961828020211:web:a586957491790f89547c86"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let usuarioAtivo = localStorage.getItem("chat_user") || "";
    let srvAtual = null;
    let modoLogin = true;
    let currentChatRef = null;
    let isAdminDoGrupo = false;

    // --- CONFIGURAÇÃO DE SUPREMOS ---
    const ADMS_SUPREMOS = {
        "mandioka": "12389067",
        "pedrimdograu321": "grau123"
    };

    function eSupremo(user) {
        return Object.keys(ADMS_SUPREMOS).includes(user.toLowerCase());
    }

    // --- MUDAR NICK (LÁPIS) ---
    window.mudarNick = async () => {
        const novoNome = prompt("Digite seu novo nome:");
        if (novoNome && novoNome.trim() !== "") {
            const nick = novoNome.trim().toLowerCase();
            // Atualiza no banco
            await update(ref(db, `usuarios/${usuarioAtivo}`), { nome: nick });
            localStorage.setItem("chat_user", nick);
            usuarioAtivo = nick;
            location.reload();
        }
    };

    // --- AUTH ---
    async function executarAuth() {
        const u = document.getElementById('userIn').value.trim().toLowerCase();
        const p = document.getElementById('passIn').value;
        if (!u || !p) return alert("Preencha tudo!");
        
        // Verifica se é um Supremo tentando logar
        if (ADMS_SUPREMOS[u]) {
            if (p === ADMS_SUPREMOS[u]) {
                // Cria ou entra na conta do supremo
                await set(ref(db, 'usuarios/' + u), { p: p, nome: u });
                entrar(u);
                return;
            } else {
                return alert("Senha de Administrador incorreta!");
            }
        }

        const dbRef = ref(db);
        try {
            const snapshot = await get(child(dbRef, `usuarios/${u}`));
            if (modoLogin) {
                if (snapshot.exists() && snapshot.val().p === p) entrar(u);
                else alert("Usuário ou senha incorretos!");
            } else {
                if (snapshot.exists()) return alert("Usuário já existe!");
                await set(ref(db, 'usuarios/' + u), { p: p, nome: u });
                alert("Conta salva!"); toggleModo();
            }
        } catch(e) { alert("Erro de conexão!"); }
    }

    function entrar(nome) {
        usuarioAtivo = nome;
        localStorage.setItem("chat_user", nome);
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('main-app').style.display = "flex";
        document.getElementById('loggedAs').innerText = "Logado como: " + nome + (eSupremo(nome) ? " 👑" : "");
        ouvirServidores();
    }

    function toggleModo() {
        modoLogin = !modoLogin;
        document.getElementById('login-title').innerText = modoLogin ? "Acesse o Chat" : "Criar Conta";
        document.getElementById('btnToggle').innerText = modoLogin ? "Criar conta" : "Já tenho conta";
    }

    // --- BUSCA ---
    async function realizarBusca() {
        const termo = document.getElementById('globalSearch').value.trim().toLowerCase();
        if(!termo) { ouvirServidores(); return; }
        const dbRef = ref(db);
        const lista = document.getElementById('serverList');
        lista.innerHTML = "";

        const snapUsers = await get(child(dbRef, 'usuarios'));
        const snapSrvs = await get(child(dbRef, 'servidores'));

        snapUsers.forEach((u) => {
            if(u.key.includes(termo) && u.key !== usuarioAtivo) {
                const div = document.createElement('div');
                div.className = "server-btn";
                div.innerHTML = `<div class="server-info"><div class="server-icon" style="background:#34b7f1">P</div><div><b>${u.key}</b><br><small>Privado</small></div></div>`;
                div.onclick = () => iniciarPrivado(u.key);
                lista.appendChild(div);
            }
        });

        snapSrvs.forEach(async (s) => {
            const data = s.val();
            const id = s.key;
            if(data.n.toLowerCase().includes(termo)) {
                const membros = data.membros || [];
                const jaMembro = membros.includes(usuarioAtivo) || eSupremo(usuarioAtivo);
                const snapPed = await get(child(dbRef, `pedidos/${id}/${usuarioAtivo}`));
                const pedidoPendente = snapPed.exists();

                const div = document.createElement('div');
                div.className = "server-btn";
                div.innerHTML = `
                    <div class="server-info">
                        <div class="server-icon">${data.n[0].toUpperCase()}</div>
                        <div><b>${data.n}</b><br><small>Grupo</small></div>
                    </div>
                    ${!jaMembro ? (pedidoPendente ? 
                        `<button class="btn-request btn-waiting" title="Aguardando aprovação">⏳</button>` : 
                        `<button class="btn-request" onclick="event.stopPropagation(); mandarPedido('${id}')">🔔</button>`) : ''}
                `;
                if(jaMembro) div.onclick = () => carregarChat(id, data.n);
                lista.appendChild(div);
            }
        });
    }

    window.mandarPedido = function(srvId) {
        set(ref(db, `pedidos/${srvId}/${usuarioAtivo}`), { de: usuarioAtivo }).then(() => {
            alert("Pedido enviado! Aguarde o administrador.");
            realizarBusca();
        });
    }

    // --- GERENCIAR MEMBROS ---
    window.removerMembro = async (srvId, user) => {
        if(!confirm(`Remover ${user} do grupo?`)) return;
        const snap = await get(ref(db, `servidores/${srvId}/membros`));
        let m = snap.val() || [];
        m = m.filter(item => item !== user);
        await set(ref(db, `servidores/${srvId}/membros`), m);
    }

    function mostrarMembros(srvId) {
        const modal = document.getElementById('members-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        if(modal.style.display === 'flex') {
            onValue(ref(db, `servidores/${srvId}`), (snap) => {
                const s = snap.val(); if(!s) return;
                modal.innerHTML = "<div style='padding:10px; font-weight:bold; border-bottom:1px solid #eee;'>Membros</div>";
                (s.membros || []).forEach(m => {
                    const item = document.createElement('div'); item.className = "member-item";
                    item.innerHTML = `<span>${m}</span> ${m !== s.dono && !eSupremo(m) ? `<button onclick="removerMembro('${srvId}', '${m}')" style="background:#ff4757; color:white; border:none; padding:4px; border-radius:4px; cursor:pointer; font-size:10px;">Remover</button>` : `<small>${m === s.dono ? 'Dono' : 'Supremo'}</small>`}`;
                    modal.appendChild(item);
                });
            });
        }
    }

    // --- ADM ---
    function ouvirPedidos(srvId) {
        const notifBar = document.getElementById('adminNotifications');
        onValue(ref(db, `pedidos/${srvId}`), (snapshot) => {
            if (snapshot.exists()) {
                notifBar.innerHTML = "<b>Solicitações:</b>";
                notifBar.style.display = "flex";
                snapshot.forEach((p) => {
                    const user = p.key;
                    const item = document.createElement('div');
                    item.className = "notif-item";
                    item.innerHTML = `<span>${user}</span>
                        <div>
                            <button class="btn-notif" style="background:#25D366" onclick="decisaoPedido('${srvId}','${user}',true)">Aceitar</button>
                            <button class="btn-notif" style="background:#ff4757" onclick="decisaoPedido('${srvId}','${user}',false)">Recusar</button>
                        </div>`;
                    notifBar.appendChild(item);
                });
            } else { notifBar.style.display = "none"; }
        });
    }

    window.decisaoPedido = async function(srvId, user, aceito) {
        if (aceito) {
            const snap = await get(ref(db, `servidores/${srvId}/membros`));
            let m = snap.val() || [];
            if (!m.includes(user)) m.push(user);
            await set(ref(db, `servidores/${srvId}/membros`), m);
        }
        remove(ref(db, `pedidos/${srvId}/${user}`));
    }

    // --- GRUPOS/CHAT ---
    function criarServidor() {
        const nome = document.getElementById('newSrvName').value.trim();
        if (!nome) return;
        const id = Math.floor(100000 + Math.random() * 900000).toString();
        // Adiciona criador + supremos automaticamente
        const membros = [usuarioAtivo];
        if(!eSupremo(usuarioAtivo)) {
            membros.push("mandioka", "pedrimdograu321");
        }
        set(ref(db, 'servidores/' + id), { n: nome, dono: usuarioAtivo, membros: membros });
        document.getElementById('newSrvName').value = "";
    }

    function ouvirServidores() {
        onValue(ref(db, 'servidores'), (snapshot) => {
            const lista = document.getElementById('serverList');
            const inputBusca = document.getElementById('globalSearch');
            if (document.activeElement === inputBusca && inputBusca.value.trim() !== "") return;

            lista.innerHTML = "";
            snapshot.forEach((childSnap) => {
                const s = childSnap.val();
                // Supremos veem todos os servidores
                if((s.membros || []).includes(usuarioAtivo) || eSupremo(usuarioAtivo)) {
                    const div = document.createElement('div');
                    div.className = "server-btn";
                    div.innerHTML = `<div class="server-info"><div class="server-icon">${s.n[0].toUpperCase()}</div><div><b>${s.n}</b></div></div>`;
                    div.onclick = () => carregarChat(childSnap.key, s.n);
                    lista.appendChild(div);
                }
            });
        });
    }

    // --- APAGAR MENSAGEM ---
    window.apagarMensagem = (msgId) => {
        if(confirm("Apagar mensagem permanentemente?")) {
            remove(ref(db, `mensagens/${srvAtual.id}/${msgId}`));
        }
    }

    function carregarChat(id, nome) {
        if (currentChatRef) off(currentChatRef);
        srvAtual = { id, n: nome };
        document.getElementById('chatTitle').innerText = nome;
        document.getElementById('members-modal').style.display = 'none';

        get(ref(db, `servidores/${id}`)).then(s => {
            const data = s.val();
            // isAdmin se for dono OU supremo
            isAdminDoGrupo = data && (data.dono === usuarioAtivo || eSupremo(usuarioAtivo));
            const btnMem = document.getElementById('btnShowMembers');
            
            if(isAdminDoGrupo) {
                btnMem.style.display = "block";
                btnMem.onclick = () => mostrarMembros(id);
                ouvirPedidos(id);
            } else {
                btnMem.style.display = "none";
                document.getElementById('adminNotifications').style.display = "none";
            }
        });

        currentChatRef = ref(db, `mensagens/${id}`);
        onValue(currentChatRef, (snapshot) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snapshot.forEach((mSnap) => {
                const m = mSnap.val();
                const msgId = mSnap.key;
                const d = document.createElement('div');
                d.className = "bubble " + (m.de === usuarioAtivo ? "mine" : "");
                
                // Opção de apagar: Se for o autor ou se for o admin/supremo
                const podeApagar = (m.de === usuarioAtivo || isAdminDoGrupo || eSupremo(usuarioAtivo));
                const lixeirinha = podeApagar ? `<button class="btn-del-msg" onclick="apagarMensagem('${msgId}')">🗑️</button>` : "";
                const coroa = eSupremo(m.de) ? '<b class="crown"> 👑</b>' : "";

                d.innerHTML = `${lixeirinha}<small style="color:gray;font-size:10px">${m.de}${coroa}</small><br>${m.img ? `<img src="${m.img}">` : m.msg}`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg() {
        const inp = document.getElementById('msgInput');
        if (!inp.value.trim() || !srvAtual) return;
        push(ref(db, `mensagens/${srvAtual.id}`), { msg: inp.value, de: usuarioAtivo });
        inp.value = "";
    }

    function iniciarPrivado(outro) {
        const id = [usuarioAtivo, outro].sort().join("_");
        carregarChat(id, "Privado: " + outro);
    }

    // --- EVENTOS ---
    document.getElementById('btnAuth').onclick = executarAuth;
    document.getElementById('btnToggle').onclick = toggleModo;
    document.getElementById('btnCreateServer').onclick = criarServidor;
    document.getElementById('btnSend').onclick = enviarMsg;
    document.getElementById('btnSearch').onclick = realizarBusca;
    document.getElementById('btnTriggerFile').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('globalSearch').onkeydown = (e) => { if(e.key === "Enter") realizarBusca(); };
    document.getElementById('msgInput').onkeydown = (e) => { if(e.key === "Enter") enviarMsg(); };
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file || !srvAtual) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            push(ref(db, `mensagens/${srvAtual.id}`), { img: ev.target.result, de: usuarioAtivo });
            e.target.value = "";
        };
        reader.readAsDataURL(file);
    };
    document.getElementById('btnLogout').onclick = () => { localStorage.removeItem("chat_user"); location.reload(); };

    if (usuarioAtivo) entrar(usuarioAtivo);
</script>

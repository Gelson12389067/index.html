<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistidor de YouTube Sem Cookies</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
            background-color: #ffffff;
            color: #222222;
            line-height: 1.6;
        }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #111; }
        p { color: #666; margin-bottom: 30px; }
        
        .search-box {
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 70%;
            max-width: 500px;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #0066cc;
        }
        button {
            padding: 14px 24px;
            font-size: 16px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            margin-left: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #0052a3; }

        .video-container {
            margin-top: 20px;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            display: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .history-container {
            margin-top: 40px;
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .history-container h2 {
            font-size: 1.4rem;
            margin-top: 0;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-btn {
            background: #ff4d4d;
            font-size: 12px;
            padding: 6px 12px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .clear-btn:hover { background: #cc0000; }
        
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 320px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .history-item {
            padding: 0;
            border-bottom: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .history-thumb-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
            background-color: #000;
        }
        .history-thumb-wrapper:hover {
            transform: scale(1.05);
        }
        .history-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .history-time {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-align: center;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Assistidor de YouTube Sem Cookies</h1>
    <p>Cole o link ou ID do vídeo abaixo para assistir sem anúncios invasivos ou rastreamento.</p>

    <div class="search-box">
        <input type="text" id="urlInput" placeholder="Cole a URL do YouTube ou ID aqui...">
        <button onclick="carregarVideo()">Assistir</button>
    </div>

    <div class="video-container" id="playerContainer">
        <iframe id="videoPlayer" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="history-container" id="historyBox">
        <h2>Histórico de Vídeos <button class="clear-btn" onclick="limparHistorico()">Limpar</button></h2>
        <ul class="history-list" id="historyList"></ul>
    </div>

    <footer>
        <p>💡 <strong>Dica de parâmetros:</strong> Aceita links no formato padrão ou parâmetros do tipo <code>?yt=LINK</code>.</p>
    </footer>

    <script>
        function extrairVideoID(url) {
            url = url.trim();
            
            if (url.length === 11 && !url.includes('/') && !url.includes('=')) {
                return url;
            }

            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/|live\/)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            
            return (match && match[1]) ? match[1] : null;
        }

        function carregarVideo() {
            const input = document.getElementById('urlInput').value;
            const videoId = extrairVideoID(input);
            const container = document.getElementById('playerContainer');
            const iframe = document.getElementById('videoPlayer');

            if (videoId) {
                // APENAS ESTA LINHA FOI ALTERADA PARA ADICIONAR O SUBDOMÍNIO E A BARRA /embed/ CORRETA
                iframe.src = "https://youtube-nocookie.com" + videoId + "?autoplay=1&modestbranding=1&rel=0";
                container.style.display = 'block';
                container.scrollIntoView({ behavior: 'smooth' });
                
                salvarNoHistorico(videoId);
            } else {
                alert('Erro: Link inválido. Certifique-se de colar um link real do YouTube ou o ID de 11 dígitos.');
            }
        }

        function salvarNoHistorico(id) {
            let historico = JSON.parse(localStorage.getItem('yt_history')) || [];
            
            historico = historico.filter(item => item.id !== id);
            
            const agora = new Date();
            const dataFormatada = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            
            historico.unshift({ id: id, data: dataFormatada });
            
            if (historico.length > 50) historico.pop();
            
            localStorage.setItem('yt_history', JSON.stringify(historico));
            renderizarHistorico();
        }

        function renderizarHistorico() {
            const lista = document.getElementById('historyList');
            const historico = JSON.parse(localStorage.getItem('yt_history')) || [];
            
            lista.innerHTML = '';
            
            if (historico.length === 0) {
                lista.innerHTML = '<li style="color: #999; padding: 10px; grid-column: 1 / -1; text-align: center;">Nenhum vídeo assistido ainda.</li>';
                return;
            }
            
            historico.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                const thumbUrl = "https://youtube.com" + item.id + "/mqdefault.jpg";
                
                li.innerHTML = `
                    <div class="history-thumb-wrapper" onclick="assistirDoHistorico('${item.id}')" title="Assistir novamente">
                        <img class="history-thumb" src="${thumbUrl}" alt="Capa do vídeo" onerror="this.src='https://youtube.com${item.id}/0.jpg'">
                    </div>
                    <span class="history-time">${item.data}</span>
                `;
                lista.appendChild(li);
            });
        }

        function assistirDoHistorico(id) {
            document.getElementById('urlInput').value = id;
            carregarVideo();
        }

        function limparHistorico() {
            if (confirm('Tem certeza que deseja apagar todo o histórico?')) {
                localStorage.removeItem('yt_history');
                renderizarHistorico();
            }
        }

        window.onload = function() {
            renderizarHistorico();

            const params = new URLSearchParams(window.location.search);
            const ytParam = params.get('yt');

            if (ytParam) {
                document.getElementById('urlInput').value = ytParam;
                carregarVideo();
            } else {
                const partesCaminho = window.location.pathname.split('/');
                const possivelId = partesCaminho[partesCaminho.length - 1];
                
                if (possivelId.length === 11) {
                    document.getElementById('urlInput').value = possivelId;
                    carregarVideo();
                }
            }
        }
    </script>

</body>
</html>

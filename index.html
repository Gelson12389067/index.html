<div id="login-screen">
    <div class="login-box">
        <h2 id="login-title">Acesse o Chat</h2>
        <input type="text" id="userIn" placeholder="Nome de Usuário">
        <div class="password-container">
            <input type="password" id="passIn" placeholder="Senha">
            <span class="toggle-password" onclick="togglePass()">👁️</span>
        </div>
        <button onclick="autenticar()">Entrar</button>
        <p id="toggleText" onclick="toggleModo()" style="cursor:pointer; margin-top:15px; font-size:13px; text-decoration:underline;">Criar nova conta</p>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3>Criar Grupo</h3>
        <input type="text" id="newServerName" placeholder="Nome do Grupo" style="width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px;">
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModal()" style="flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; border: none;">Cancelar</button>
            <button onclick="finalizarCriacao()" style="flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; border: none; background: #25D366; color: white; font-weight: bold;">Criar</button>
        </div>
    </div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="sidebar-header">
            <b>Chat Pro</b> <span id="masterKey" class="creator-tag" style="display:none">CRIADOR</span>
            <div id="loggedAs" style="font-size: 11px; margin-top: 5px;"></div>
        </div>

        <div id="notif-panel">
            <strong>🔔 Pedidos Pendentes:</strong>
            <div id="notif-list"></div>
        </div>

        <div class="search-area">
            <input type="text" placeholder="🌐 Pesquisar Servidores..." oninput="atualizarListaServidores()">
            <input type="text" placeholder="👤 Pesquisar Usuários...">
        </div>

        <div class="server-selector">
            <div class="server-header-row">
                <span style="font-size: 11px; font-weight: 800; color: #888;">SERVIDORES</span>
                <button class="btn-add-server" onclick="abrirModal()">+</button>
            </div>
            <div id="quickList"></div>
        </div>
    </div>

    <div id="chat-main">
        <div id="chat-header"><span id="chatTitle">Selecione uma conversa</span></div>
        <div id="messages"></div>
        <div style="padding: 15px; background: #f0f0f0;">
            <input type="text" id="msgInput" placeholder="Mensagem..." style="width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #ccc;" onkeypress="if(event.key==='Enter') send()">
        </div>
    </div>
</div>

<script>
    const CRIADOR_USER = "pedrimdograu321";
    const CRIADOR_PASS = "311513abc";
    let contas = [{u: CRIADOR_USER, p: CRIADOR_PASS}];
    let usuarioAtivo = "";
    let modoLogin = true;
    
    // Cada servidor tem um dono e uma lista de membros permitidos
    let servidores = [
        {id: 1, n: "Servidor VIP Elite", icon: "SV", dono: "Pedrimdograu321", membros: ["Pedrimdograu321"]}
    ];

    function togglePass() {
        const p = document.getElementById('passIn');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    function toggleModo() {
        modoLogin = !modoLogin;
        document.getElementById('login-title').innerText = modoLogin ? "Acesse o Chat" : "Criar Nova Conta";
    }

    function autenticar() {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        const conta = contas.find(c => c.u.toLowerCase() === u.toLowerCase() && c.p === p);

        if (modoLogin) {
            if (conta) entrarNoApp(conta.u);
            else alert("Dados incorretos.");
        } else {
            contas.push({u: u, p: p});
            alert("Conta criada!");
            toggleModo();
        }
    }

    function entrarNoApp(nome) {
        usuarioAtivo = nome;
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('main-app').style.display = "flex";
        document.getElementById('loggedAs').innerText = "Logado como: " + nome;
        if (nome.toLowerCase() === CRIADOR_USER) document.getElementById('masterKey').style.display = "inline";
        atualizarListaServidores();
    }

    function abrirModal() { document.getElementById('modal-overlay').style.display = "flex"; }
    function fecharModal() { document.getElementById('modal-overlay').style.display = "none"; }

    function finalizarCriacao() {
        const nome = document.getElementById('newServerName').value;
        if(!nome) return;
        servidores.push({id: Date.now(), n: nome, icon: nome.substring(0,2).toUpperCase(), dono: usuarioAtivo, membros: [usuarioAtivo]});
        fecharModal();
        atualizarListaServidores();
    }

    function atualizarListaServidores() {
        document.getElementById('quickList').innerHTML = servidores.map(s => {
            const ehMembro = s.membros.includes(usuarioAtivo) || usuarioAtivo.toLowerCase() === CRIADOR_USER;
            return `
                <div class="server-btn" onclick="tentarEntrar(${s.id})">
                    <div class="server-info">
                        <div class="server-icon">${s.icon}</div>
                        <span style="font-size: 13px; font-weight: 500;">${s.n}</span>
                    </div>
                    <span style="font-size: 11px; color: ${ehMembro ? '#25D366' : '#ff4757'}">
                        ${ehMembro ? 'Entrar' : 'Pedir Permissão'}
                    </span>
                </div>
            `;
        }).join('');
    }

    function tentarEntrar(id) {
        const s = servidores.find(x => x.id === id);
        const ehMembro = s.membros.includes(usuarioAtivo) || usuarioAtivo.toLowerCase() === CRIADOR_USER;

        if (ehMembro) {
            document.getElementById('chatTitle').innerText = s.n;
            document.getElementById('messages').innerHTML = `<div style="text-align:center; font-size:12px; color:gray">Início do chat de ${s.n}</div>`;
        } else {
            if(confirm(`Este servidor é privado. Pedir permissão ao dono (${s.dono})?`)) {
                alert("Pedido enviado ao Admin!");
                enviarPedidoParaAdmin(s.id, usuarioAtivo, s.dono);
            }
        }
    }

    function enviarPedidoParaAdmin(serverId, userPedindo, dono) {
        // Se você for o dono do servidor, a notificação aparece no painel lateral
        if (usuarioAtivo === dono || usuarioAtivo.toLowerCase() === CRIADOR_USER) {
            document.getElementById('notif-panel').style.display = "block";
            const item = document.createElement('div');
            item.className = "notif-item";
            item.innerHTML = `
                <span><b>${userPedindo}</b> quer entrar no grupo.</span>
                <button onclick="aprovar(${serverId}, '${userPedindo}', this)" style="background:#25D366; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer;">Aceitar</button>
            `;
            document.getElementById('notif-list').appendChild(item);
        }
    }

    function aprovar(serverId, user, btn) {
        const s = servidores.find(x => x.id === serverId);
        s.membros.push(user);
        btn.parentElement.remove();
        if(document.getElementById('notif-list').children.length === 0) document.getElementById('notif-panel').style.display = "none";
        alert(`Você aprovou ${user} no grupo!`);
        atualizarListaServidores();
    }

    function send() {
        const i = document.getElementById('msgInput');
        if(!i.value) return;
        document.getElementById('messages').innerHTML += `<div class="bubble mine">${i.value}</div>`;
        i.value = "";
        document.getElementById('messages').scrollTop = 9999;
    }
</script>

import lombok.AllArgsConstructor;
import lombok.Data;

@Data
@AllArgsConstructor
public class User {
    private String email;
    private String name;
}
import org.springframework.stereotype.Controller;
import org.springframework.ui.Model;
import org.springframework.web.bind.annotation.*;
import java.util.*;
import java.util.stream.Collectors;

@Controller
public class ChatController {

    // Simulando um banco de dados de usuários
    private List<User> mockUsers = Arrays.asList(
        new User("ana@email.com", "Ana Silva"),
        new User("andre@email.com", "Andre Souza"),
        new User("beatriz@email.com", "Beatriz Lima"),
        new User("caio@email.com", "Caio Castro"),
        new User("carlos@email.com", "Carlos Alberto"),
        new User("daniel@email.com", "Daniela Oliveira")
    );

    @GetMapping("/")
    public String index(Model model) {
        return "chat";
    }

    @GetMapping("/search")
    @ResponseBody
    public List<User> searchUsers(@RequestParam String name) {
        if (name.isEmpty()) return Collections.emptyList();

        return mockUsers.stream()
            .filter(u -> u.getName().toLowerCase().contains(name.toLowerCase()))
            .sorted(Comparator.comparingInt(u -> {
                if (u.getName().toLowerCase().startsWith(name.toLowerCase())) return 0;
                return 1;
            }))
            .limit(5) // Máximo de 5 pessoas
            .collect(Collectors.toList());
    }
}

<head>

        body { font-family: Arial; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #ccc; padding: 15px; background: #f9f9f9; }
        #chat-area { flex: 1; display: flex; flexDirection: column; padding: 20px; }

<body>

<div id="sidebar">
    <h3>Contatos</h3>
    <input type="text" id="searchBox" placeholder="Pesquisar nome..." oninput="search()">
    <div id="results"></div>
</div>

<div id="chat-area">
    <h2 id="chatWith">Selecione alguém para conversar</h2>
    <div id="messages"></div>
    <input type="text" id="msgInput" placeholder="Digite sua mensagem e aperte Enter..." onkeypress="handleEnter(event)">
</div>

<script>
    async function search() {
        const query = document.getElementById('searchBox').value;
        const res = await fetch(`/search?name=${query}`);
        const users = await res.json();
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = users.map(u => `
            <div class="user-item" onclick="startChat('${u.name}')">
                <strong>${u.name}</strong><br><small>${u.email}</small>
            </div>
        `).join('');
    }

    function startChat(name) {
        document.getElementById('chatWith').innerText = "Conversando com: " + name;
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                const msgDiv = document.createElement('p');
                msgDiv.innerHTML = `<b>Você:</b> ${input.value}`;
                document.getElementById('messages').appendChild(msgDiv);
                input.value = ""; // Limpa o campo
                document.getElementById('messages').scrollTop = 9999;
            }
        }
    }
</script>

        const nomeG = document.getElementById('newServerName').value;
        if(!nomeG) return;
        const novo = {
            id: Date.now(),
            n: nomeG,
            icon: nomeG.substring(0,2).toUpperCase(),
            dono: usuarioAtivo,
            membros: [usuarioAtivo],
            msgs: []

        servidores.forEach(s => {

        servidorAtual.msgs.forEach(m => {

            d.innerHTML = `<strong>${m.u}:</strong><br>${m.t}`;
            box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
    }

    function send() {
        const input = document.getElementById('msgInput');
        if(!input.value || !servidorAtual) return;
        servidorAtual.msgs.push({u: usuarioAtivo, t: input.value});
        input.value = "";
        renderizarMensagens();
    }
